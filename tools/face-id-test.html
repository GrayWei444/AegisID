<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AegisID — Face Structure ID v7</title>
<style>

<body>
<div class="wrap">
  <h1>▣ AEGISID v7</h1>
  <p class="sub">RGB: Align→Gray→CLAHE→Blur→Gabor/LBP | Depth: Align→Laplacian</p>
  <div id="bar">Click Start to load models</div>
  <div style="text-align:center;margin-bottom:10px"><video id="vid" autoplay playsinline></video></div>
  <div class="btns">
    <button id="b1" onclick="doStart()">▶ Start</button>
    <button id="b2" onclick="doCapture()" disabled>📸 Capture</button>
    <button id="b3" onclick="doCapture5()" disabled>📸×5</button>
    <button id="b4" onclick="doClear()" disabled>🗑 Clear</button>
    <button onclick="document.getElementById('log').style.display=document.getElementById('log').style.display==='none'?'block':'none'">📋 Log</button>
  </div>
  <div id="res"></div>
  <div id="stab" class="stab" style="display:none"></div>
  <div id="log"></div>
</div>

<script>
// ============================================================
// GLOBALS — no heavy libs loaded yet
// ============================================================
var fl=null,ds=null,ort=null,FaceLandmarker=null,FilesetResolver=null;
var caps=[],ready=false;
var vid=document.getElementById('vid');

function st(t,type){
  var e=document.getElementById('bar');
  e.textContent=t;
  e.style.color=type==='ok'?'#0f0':type==='er'?'#f44':'#ffc107';
  e.style.borderColor=type==='ok'?'#003300':type==='er'?'#330000':'#2a2a00';
  lg(t);
}
function lg(t){
  var el=document.getElementById('log');
  el.textContent+=new Date().toLocaleTimeString()+' '+t+'\n';
  el.scrollTop=el.scrollHeight;
}

window.onerror=function(m,s,l){st('Error: '+m+' L'+l,'er')};
window.onunhandledrejection=function(e){st('Reject: '+(e.reason?.message||e.reason),'er')};

async function sha256(d){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(d));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}

function makeCanvas(w,h){
  if(typeof OffscreenCanvas!=='undefined')return new OffscreenCanvas(w,h);
  var c=document.createElement('canvas');c.width=w;c.height=h;return c;
}

// ============================================================
// START — lazy load everything
// ============================================================
async function doStart(){
  document.getElementById('b1').disabled=true;
  try{
    // 1. Load MediaPipe
    st('Loading MediaPipe FaceLandmarker...','ld');
    var mp=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs');
    FaceLandmarker=mp.FaceLandmarker;
    FilesetResolver=mp.FilesetResolver;
    lg('MediaPipe module imported');

    var fr=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm');
    fl=await FaceLandmarker.createFromOptions(fr,{
      baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',delegate:'GPU'},
      outputFaceBlendshapes:false,runningMode:'IMAGE',numFaces:1
    });
    lg('FaceLandmarker ready');

    // 2. Depth model — lazy load on first capture to save memory
    lg('Depth model will load on first capture');

    // 3. Camera
    st('Starting camera...','ld');
    var stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
    vid.srcObject=stream;
    await vid.play();
    lg('Camera started: '+vid.videoWidth+'x'+vid.videoHeight);

    ready=true;
    document.getElementById('b2').disabled=false;
    document.getElementById('b3').disabled=false;
    document.getElementById('b4').disabled=false;
    st('Ready — click Capture','ok');
  }catch(e){
    st('Init error: '+e.message,'er');
    console.error(e);
  }
}

function loadScript(url){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src=url;s.onload=resolve;s.onerror=function(){reject(new Error('Failed to load '+url))};
    document.head.appendChild(s);
  });
}

// ============================================================
// ArcFace 5-point alignment
// ============================================================
var ARCFACE_REF=[[38.2946,51.6963],[73.5318,51.5014],[56.0252,71.7366],[41.5493,92.3655],[70.7299,92.2041]];

function getAlignPts(lm,vw,vh){
  var le=[(lm[33].x+lm[133].x)/2*vw,(lm[33].y+lm[133].y)/2*vh];
  var re=[(lm[263].x+lm[362].x)/2*vw,(lm[263].y+lm[362].y)/2*vh];
  return[le,re,[lm[1].x*vw,lm[1].y*vh],[lm[61].x*vw,lm[61].y*vh],[lm[291].x*vw,lm[291].y*vh]];
}

function simTransform(src,dst){
  var N=src.length,S2=0,Sx=0,Sy=0,rA=0,rB=0,rE=0,rF=0;
  for(var i=0;i<N;i++){
    var sx=src[i][0],sy=src[i][1],dx=dst[i][0],dy=dst[i][1];
    S2+=sx*sx+sy*sy;Sx+=sx;Sy+=sy;rA+=sx*dx+sy*dy;rB+=-sy*dx+sx*dy;rE+=dx;rF+=dy;
  }
  var den=S2-(Sx*Sx+Sy*Sy)/N;
  if(Math.abs(den)<1e-10)return{a:1,b:0,tx:0,ty:0};
  var a=(rA-(Sx*rE+Sy*rF)/N)/den,b=(rB-(-Sy*rE+Sx*rF)/N)/den;
  return{a:a,b:b,tx:(rE-Sx*a+Sy*b)/N,ty:(rF-Sy*a-Sx*b)/N};
}

function arcfaceAlign(source,lm,size){
  var vw=source.videoWidth||source.width,vh=source.videoHeight||source.height;
  var t=simTransform(getAlignPts(lm,vw,vh),ARCFACE_REF);
  var c=makeCanvas(size,size),ctx=c.getContext('2d');
  ctx.setTransform(t.a,t.b,-t.b,t.a,t.tx,t.ty);
  ctx.drawImage(source,0,0);
  ctx.resetTransform();
  return ctx.getImageData(0,0,size,size);
}

// ============================================================
// Image Normalization: Gray → CLAHE → Blur → MinMax
// ============================================================
function toGray(img){
  var px=img.data,n=img.width*img.height,g=new Uint8Array(n);
  for(var i=0;i<n;i++)g[i]=Math.round(.299*px[i*4]+.587*px[i*4+1]+.114*px[i*4+2]);
  return{data:g,width:img.width,height:img.height};
}

function clahe(g,clip,gw,gh){
  clip=clip||2;gw=gw||8;gh=gh||8;
  var d=g.data,w=g.width,h=g.height,out=new Uint8Array(d.length);
  var tw=Math.floor(w/gw),th=Math.floor(h/gh);
  var cdfs=[];
  for(var ty=0;ty<gh;ty++){cdfs[ty]=[];for(var tx=0;tx<gw;tx++){
    var hist=new Float32Array(256),cnt=0;
    var y0=ty*th,y1=Math.min(y0+th,h),x0=tx*tw,x1=Math.min(x0+tw,w);
    for(var y=y0;y<y1;y++)for(var x=x0;x<x1;x++){hist[d[y*w+x]]++;cnt++}
    var lim=Math.max(1,Math.floor(clip*cnt/256)),ex=0;
    for(var i=0;i<256;i++){if(hist[i]>lim){ex+=hist[i]-lim;hist[i]=lim}}
    var inc=Math.floor(ex/256);for(var i=0;i<256;i++)hist[i]+=inc;
    var cdf=new Float32Array(256);cdf[0]=hist[0];
    for(var i=1;i<256;i++)cdf[i]=cdf[i-1]+hist[i];
    var mn=cdf[0],mx=cdf[255],sc=mx>mn?255/(mx-mn):1;
    for(var i=0;i<256;i++)cdf[i]=Math.round((cdf[i]-mn)*sc);
    cdfs[ty][tx]=cdf;
  }}
  for(var y=0;y<h;y++){for(var x=0;x<w;x++){
    var fy=y/th-.5,fx=x/tw-.5;
    var t1=Math.max(0,Math.floor(fy)),t2=Math.min(gh-1,t1+1);
    var l1=Math.max(0,Math.floor(fx)),l2=Math.min(gw-1,l1+1);
    var wy=fy-t1,wx=fx-l1,v=d[y*w+x];
    out[y*w+x]=Math.round((cdfs[t1][l1][v]*(1-wx)+cdfs[t1][l2][v]*wx)*(1-wy)+(cdfs[t2][l1][v]*(1-wx)+cdfs[t2][l2][v]*wx)*wy);
  }}
  return{data:out,width:w,height:h};
}

function blur3(g){
  var d=g.data,w=g.width,h=g.height,o=new Uint8Array(d.length);
  for(var y=1;y<h-1;y++)for(var x=1;x<w-1;x++){
    o[y*w+x]=(d[(y-1)*w+x-1]+2*d[(y-1)*w+x]+d[(y-1)*w+x+1]+2*d[y*w+x-1]+4*d[y*w+x]+2*d[y*w+x+1]+d[(y+1)*w+x-1]+2*d[(y+1)*w+x]+d[(y+1)*w+x+1])>>4;
  }
  for(var x=0;x<w;x++){o[x]=d[x];o[(h-1)*w+x]=d[(h-1)*w+x]}
  for(var y=0;y<h;y++){o[y*w]=d[y*w];o[y*w+w-1]=d[y*w+w-1]}
  return{data:o,width:w,height:h};
}

function normMinMax(g){
  var d=g.data,o=new Uint8Array(d.length),mn=255,mx=0;
  for(var i=0;i<d.length;i++){mn=Math.min(mn,d[i]);mx=Math.max(mx,d[i])}
  var r=mx-mn||1;
  for(var i=0;i<d.length;i++)o[i]=Math.round((d[i]-mn)/r*255);
  return{data:o,width:g.width,height:g.height};
}

function normalize(img){
  var g=toGray(img);
  var eq=histEq(g);
  var masked=applyFaceMask(eq);
  return{final:masked, steps:{gray:g, eq:eq, masked:masked}};
}

// Simple global histogram equalization (not CLAHE)
function histEq(g){
  var d=g.data,w=g.width,h=g.height,n=w*h;
  var hist=new Uint32Array(256);
  for(var i=0;i<n;i++)hist[d[i]]++;
  var cdf=new Uint32Array(256);
  cdf[0]=hist[0];
  for(var i=1;i<256;i++)cdf[i]=cdf[i-1]+hist[i];
  var cdfMin=0;
  for(var i=0;i<256;i++){if(cdf[i]>0){cdfMin=cdf[i];break}}
  var out=new Uint8Array(n);
  var scale=255/(n-cdfMin||1);
  for(var i=0;i<n;i++)out[i]=Math.round((cdf[d[i]]-cdfMin)*scale);
  return{data:out,width:w,height:h};
}

// Difference of Gaussians: subtract large-blur from small-blur
// Result = only medium-frequency structure (edges, wrinkles, features)
// Low-freq lighting → gone. High-freq noise → gone.
function dog(g){
  var small=gaussBlur(g,1.0);  // σ=1: keeps structure
  var large=gaussBlur(g,4.0);  // σ=4: only lighting remains
  var d=g.data,w=g.width,h=g.height;
  var out=new Uint8Array(w*h);
  for(var i=0;i<w*h;i++){
    // small - large = structure without lighting, shift to 0-255
    out[i]=Math.max(0,Math.min(255,small.data[i]-large.data[i]+128));
  }
  return{data:out,width:w,height:h};
}

// Gaussian blur with variable sigma (separable, two-pass)
function gaussBlur(g,sigma){
  var d=g.data,w=g.width,h=g.height;
  var r=Math.ceil(sigma*3),ks=r*2+1;
  // Build 1D kernel
  var kern=new Float32Array(ks),sum=0;
  for(var i=0;i<ks;i++){var x=i-r;kern[i]=Math.exp(-x*x/(2*sigma*sigma));sum+=kern[i]}
  for(var i=0;i<ks;i++)kern[i]/=sum;
  // Horizontal pass
  var tmp=new Float32Array(w*h);
  for(var y=0;y<h;y++)for(var x=0;x<w;x++){
    var s=0;for(var k=0;k<ks;k++){var sx=Math.min(w-1,Math.max(0,x+k-r));s+=d[y*w+sx]*kern[k]}
    tmp[y*w+x]=s;
  }
  // Vertical pass
  var out=new Uint8Array(w*h);
  for(var y=0;y<h;y++)for(var x=0;x<w;x++){
    var s=0;for(var k=0;k<ks;k++){var sy=Math.min(h-1,Math.max(0,y+k-r));s+=tmp[sy*w+x]*kern[k]}
    out[y*w+x]=Math.round(s);
  }
  return{data:out,width:w,height:h};
}

// Face mask: after ArcFace alignment, face is always in same position.
// ArcFace ref points: eyes ~y52, nose ~y72, mouth ~y92
// Create elliptical mask, background → 128 (neutral gray)
function applyFaceMask(g){
  var d=g.data,w=g.width,h=g.height,o=new Uint8Array(d.length);
  // Ellipse center and radii (tuned for 112×112 ArcFace aligned)
  var cx=56,cy=68,rx=40,ry=44;
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      var dx=(x-cx)/rx,dy=(y-cy)/ry;
      if(dx*dx+dy*dy<=1.0){
        o[y*w+x]=d[y*w+x]; // inside face
      }else{
        o[y*w+x]=128; // outside → fixed neutral gray
      }
    }
  }
  return{data:o,width:w,height:h};
}

// ============================================================
// Gabor Filter Bank
// ============================================================
function gaborKernel(th,lam,sig,gam,ks){
  var half=Math.floor(ks/2),k=[],ct=Math.cos(th),st2=Math.sin(th);
  for(var y=-half;y<=half;y++)for(var x=-half;x<=half;x++){
    var xp=x*ct+y*st2,yp=-x*st2+y*ct;
    k.push(Math.exp(-(xp*xp+gam*gam*yp*yp)/(2*sig*sig))*Math.cos(2*Math.PI*xp/lam));
  }
  return{data:k,size:ks};
}

function applyK(g,kern){
  var d=g.data,w=g.width,h=g.height,k=kern.data,ks=kern.size,half=Math.floor(ks/2);
  var out=new Float32Array(w*h);
  for(var y=half;y<h-half;y++)for(var x=half;x<w-half;x++){
    var s=0;for(var ky=-half;ky<=half;ky++)for(var kx=-half;kx<=half;kx++)
      s+=d[(y+ky)*w+(x+kx)]*k[(ky+half)*(2*half+1)+(kx+half)];
    out[y*w+x]=s;
  }
  return out;
}

function gaborFeats(g){
  var thetas=[0,Math.PI/4,Math.PI/2,3*Math.PI/4],lambdas=[6,10,16];
  var GR=4,w=g.width,h=g.height,cw=Math.floor(w/GR),ch=Math.floor(h/GR),feats=[];
  for(var ti=0;ti<thetas.length;ti++)for(var li=0;li<lambdas.length;li++){
    var kern=gaborKernel(thetas[ti],lambdas[li],3,.5,11);
    var resp=applyK(g,kern);
    for(var gy=0;gy<GR;gy++)for(var gx=0;gx<GR;gx++){
      var e=0,c=0;
      for(var y=gy*ch;y<(gy+1)*ch&&y<h;y++)for(var x=gx*cw;x<(gx+1)*cw&&x<w;x++){e+=resp[y*w+x]*resp[y*w+x];c++}
      feats.push(c>0?Math.sqrt(e/c):0);
    }
  }
  return feats;
}

// ============================================================
// LBP
// ============================================================
function lbpFeats(g){
  var d=g.data,w=g.width,h=g.height,GR=4,cw=Math.floor(w/GR),ch=Math.floor(h/GR);
  var lbp=new Uint8Array(w*h);
  for(var y=1;y<h-1;y++)for(var x=1;x<w-1;x++){
    var c=d[y*w+x],code=0;
    if(d[(y-1)*w+x-1]>=c)code|=128;if(d[(y-1)*w+x]>=c)code|=64;
    if(d[(y-1)*w+x+1]>=c)code|=32;if(d[y*w+x+1]>=c)code|=16;
    if(d[(y+1)*w+x+1]>=c)code|=8;if(d[(y+1)*w+x]>=c)code|=4;
    if(d[(y+1)*w+x-1]>=c)code|=2;if(d[y*w+x-1]>=c)code|=1;
    lbp[y*w+x]=code;
  }
  var feats=[];
  for(var gy=0;gy<GR;gy++)for(var gx=0;gx<GR;gx++){
    var hist=new Float32Array(16),cnt=0;
    for(var y=gy*ch+1;y<(gy+1)*ch-1&&y<h-1;y++)for(var x=gx*cw+1;x<(gx+1)*cw-1&&x<w-1;x++){
      hist[lbp[y*w+x]>>4]++;cnt++;
    }
    if(cnt>0)for(var i=0;i<16;i++)hist[i]/=cnt;
    for(var i=0;i<16;i++)feats.push(hist[i]);
  }
  return feats;
}


// ============================================================
// Hash
// ============================================================
async function dualHash(feats,bw){
  var a=feats.map(function(v){return Math.round(v/bw)});
  var b=feats.map(function(v){return Math.round((v+bw/2)/bw)});
  return{ha:await sha256(a.join(',')),hb:await sha256(b.join(','))};
}

// ============================================================
// pHash: Perceptual Hash (DCT-based) — multiple sizes
// ============================================================

// Area-average downscale (more stable than nearest-neighbor)
function downscale(gray,targetS){
  var d=gray.data,sw=gray.width,sh=gray.height;
  var out=new Float64Array(targetS*targetS);
  var scaleX=sw/targetS,scaleY=sh/targetS;
  for(var ty=0;ty<targetS;ty++){
    for(var tx=0;tx<targetS;tx++){
      var x0=Math.floor(tx*scaleX),x1=Math.min(sw,Math.floor((tx+1)*scaleX));
      var y0=Math.floor(ty*scaleY),y1=Math.min(sh,Math.floor((ty+1)*scaleY));
      var sum=0,cnt=0;
      for(var y=y0;y<y1;y++)for(var x=x0;x<x1;x++){sum+=d[y*sw+x];cnt++}
      out[ty*targetS+tx]=cnt>0?sum/cnt:0;
    }
  }
  return out;
}

function dct2d(small,S){
  // Precompute cosine table
  var cosTable=new Float64Array(S*S);
  for(var n=0;n<S;n++)for(var k=0;k<S;k++)
    cosTable[k*S+n]=Math.cos(Math.PI*(2*n+1)*k/(2*S));

  var dct=new Float64Array(S*S);
  for(var u=0;u<S;u++){
    for(var v=0;v<S;v++){
      var sum=0;
      for(var y=0;y<S;y++){
        var cosV=cosTable[v*S+y];
        for(var x=0;x<S;x++){
          sum+=small[y*S+x]*cosTable[u*S+x]*cosV;
        }
      }
      var cu=u===0?1/Math.sqrt(2):1;
      var cv=v===0?1/Math.sqrt(2):1;
      dct[v*S+u]=(2/S)*cu*cv*sum;
    }
  }
  return dct;
}

function pHashN(gray,dctSize,inputSize){
  // 1. Area-average downscale (not nearest-neighbor — more stable)
  var small=downscale(gray,inputSize);
  // 2. 2D DCT
  var dct=dct2d(small,inputSize);
  // 3. Take top-left dctSize×dctSize coefficients (skip DC)
  var coeffs=[];
  for(var v=0;v<dctSize;v++)for(var u=0;u<dctSize;u++){
    if(u===0&&v===0)continue;
    coeffs.push(dct[v*inputSize+u]);
  }
  // 4. Median threshold → binary
  var sorted=coeffs.slice().sort(function(a,b){return a-b});
  var median=sorted[Math.floor(sorted.length/2)];
  var bits='';
  for(var i=0;i<coeffs.length;i++)bits+=(coeffs[i]>median?'1':'0');
  // 5. Hex
  var hex='';
  for(var i=0;i<bits.length;i+=4)hex+=parseInt(bits.substr(i,4)||'0',2).toString(16);
  return{bits:bits,hex:hex,nBits:coeffs.length};
}

function pHash(gray){
  return{
    p8:pHashN(gray,8,32),   // 63 bit (original)
    p5:pHashN(gray,5,32),   // 24 bit (coarser, more stable?)
    p4:pHashN(gray,4,16),   // 15 bit (very coarse, should be very stable)
  };
}

function pHashDist(a,b){
  if(a.bits.length!==b.bits.length)return a.bits.length;
  var d=0;for(var i=0;i<a.bits.length;i++)if(a.bits[i]!==b.bits[i])d++;
  return d;
}

// ============================================================
// Canvas helpers
// ============================================================
function drawGray(gray,cid){
  var c=document.getElementById(cid);if(!c)return;
  c.width=gray.width;c.height=gray.height;
  var ctx=c.getContext('2d'),id=ctx.createImageData(gray.width,gray.height);
  for(var i=0;i<gray.data.length;i++){id.data[i*4]=gray.data[i];id.data[i*4+1]=gray.data[i];id.data[i*4+2]=gray.data[i];id.data[i*4+3]=255}
  ctx.putImageData(id,0,0);
}

function drawFloat(arr,size,cid){
  var c=document.getElementById(cid);if(!c)return;
  c.width=size;c.height=size;
  var ctx=c.getContext('2d'),id=ctx.createImageData(size,size);
  var mn=1e9,mx=-1e9;
  for(var i=0;i<arr.length;i++){mn=Math.min(mn,arr[i]);mx=Math.max(mx,arr[i])}
  var rg=mx-mn||1;
  for(var i=0;i<arr.length;i++){
    var v=Math.round((arr[i]-mn)/rg*255);
    id.data[i*4]=v;id.data[i*4+1]=v;id.data[i*4+2]=v;id.data[i*4+3]=255;
  }
  ctx.putImageData(id,0,0);
}

// ============================================================
// Image Stability: SSIM + Diff
// ============================================================
function computeSSIM(grayA,grayB){
  // Simplified SSIM on grayscale images (must be same size)
  var a=grayA.data,b=grayB.data,n=a.length;
  if(a.length!==b.length)return 0;
  var C1=6.5025,C2=58.5225; // (0.01*255)^2, (0.03*255)^2
  // Global mean, variance, covariance
  var ma=0,mb=0;
  for(var i=0;i<n;i++){ma+=a[i];mb+=b[i]}
  ma/=n;mb/=n;
  var va=0,vb=0,cov=0;
  for(var i=0;i<n;i++){
    var da=a[i]-ma,db=b[i]-mb;
    va+=da*da;vb+=db*db;cov+=da*db;
  }
  va/=n;vb/=n;cov/=n;
  return((2*ma*mb+C1)*(2*cov+C2))/((ma*ma+mb*mb+C1)*(va+vb+C2));
}

function computeDiff(grayA,grayB){
  var a=grayA.data,b=grayB.data,w=grayA.width,h=grayA.height;
  var diff=new Uint8Array(w*h);
  var maxD=0;
  for(var i=0;i<a.length;i++){
    var d=Math.abs(a[i]-b[i]);
    diff[i]=d;
    if(d>maxD)maxD=d;
  }
  // Amplify for visibility (scale to 0-255)
  if(maxD>0)for(var i=0;i<diff.length;i++)diff[i]=Math.round(diff[i]/maxD*255);
  return{data:diff,width:w,height:h,maxDiff:maxD};
}

// ============================================================
// BONE RATIOS from MediaPipe landmarks
// ============================================================
function d2(a,b){return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y))}

function boneRatios(lm){
  var fw=d2(lm[234],lm[454]),fh=d2(lm[10],lm[152]),ipd=d2(lm[33],lm[263]);
  if(fw<.01||fh<.01||ipd<.01)return null;
  return{
    r01:ipd/fw,
    r02:d2(lm[168],lm[1])/fh,
    r03:d2(lm[61],lm[291])/ipd,
    r05:d2(lm[10],lm[168])/fh,
    r07:d2(lm[1],lm[152])/fh,
    r08:d2(lm[33],lm[133])/ipd,
    r09:d2(lm[70],lm[33])/fh,
    r10:d2(lm[300],lm[263])/fh,
    r11:d2(lm[98],lm[327])/fw,
    r13:d2(lm[33],lm[61])/fh,
    r14:d2(lm[263],lm[291])/fh,
    r15:fw/fh,
  };
}

// ============================================================
// DEPTH — lazy load Depth Anything V2
// ============================================================
var depthLoaded=false,depthFailed=false;

async function ensureDepth(){
  if(depthLoaded)return true;
  if(depthFailed)return false;
  try{
    st('Loading ORT + Depth model (27MB)...','ld');
    await loadScript('https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js');
    ort.env.wasm.wasmPaths='https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';
    ort.env.wasm.numThreads=1;
    ds=await ort.InferenceSession.create('/face-id-test/models/depth_anything_v2_small_int8.onnx',{executionProviders:['wasm'],graphOptimizationLevel:'all'});
    depthLoaded=true;
    lg('Depth model loaded OK');
    return true;
  }catch(e){
    depthFailed=true;
    lg('Depth model FAILED: '+e.message);
    return false;
  }
}

async function runDepth(v){
  var S=518,tc=makeCanvas(S,S),tx=tc.getContext('2d');
  tx.drawImage(v,0,0,S,S);
  var id2=tx.getImageData(0,0,S,S).data;
  var chw=new Float32Array(3*S*S),hw=S*S;
  for(var i=0;i<hw;i++){chw[i]=id2[i*4]/255;chw[hw+i]=id2[i*4+1]/255;chw[2*hw+i]=id2[i*4+2]/255}
  var inp=new ort.Tensor('float32',chw,[1,3,S,S]);
  var t0=performance.now();
  var out=await ds.run({[ds.inputNames[0]]:inp});
  var ms=Math.round(performance.now()-t0);
  inp.dispose();
  // Free input buffer
  chw=null;id2=null;
  var ok=Object.keys(out)[0],dd=out[ok].data,dm=out[ok].dims;
  var result=new Float32Array(dd);
  out[ok].dispose();
  return{data:result,h:dm[1],w:dm[2],ms:ms};
}

// Face ellipse mask check for depth (scaled to any size, matches RGB mask)
function inFaceMask(x,y,size){
  var cx2=size/2,cy2=size*68/112,rx2=size*40/112,ry2=size*44/112;
  var ddx=(x-cx2)/rx2,ddy=(y-cy2)/ry2;
  return ddx*ddx+ddy*ddy<=1.0;
}

function alignDepth(dd,dH,dW,lm,size){
  var src=getAlignPts(lm,dW,dH);
  var ref=ARCFACE_REF.map(function(p){return[p[0]*size/112,p[1]*size/112]});
  var t=simTransform(src,ref);
  var det=t.a*t.a+t.b*t.b,out=new Float32Array(size*size);
  for(var oy=0;oy<size;oy++)for(var ox=0;ox<size;ox++){
    var dx2=ox-t.tx,dy=oy-t.ty;
    var sx=Math.round((t.a*dx2+t.b*dy)/det),sy=Math.round((-t.b*dx2+t.a*dy)/det);
    if(sx>=0&&sx<dW&&sy>=0&&sy<dH)out[oy*size+ox]=dd[sy*dW+sx];
  }
  // Normalize within face mask only
  var mn=1e9,mx=-1e9;
  for(var y=0;y<size;y++)for(var x=0;x<size;x++){
    if(inFaceMask(x,y,size)){var v=out[y*size+x];if(v>0){mn=Math.min(mn,v);mx=Math.max(mx,v)}}
  }
  if(mn>=mx){mn=0;mx=1}var rg=mx-mn;
  for(var y=0;y<size;y++)for(var x=0;x<size;x++){
    if(inFaceMask(x,y,size))out[y*size+x]=(out[y*size+x]-mn)/rg;
    else out[y*size+x]=0.5;
  }
  return{data:out,size:size};
}

function laplacian(da){
  var d=da.data,S=da.size,lap=new Float32Array(S*S);
  for(var y=2;y<S-2;y++)for(var x=2;x<S-2;x++){
    if(inFaceMask(x,y,S))
      lap[y*S+x]=d[y*S+x+1]+d[y*S+x-1]+d[(y+1)*S+x]+d[(y-1)*S+x]-4*d[y*S+x];
  }
  return{data:lap,size:S};
}

function curvFeats(lap){
  var d=lap.data,S=lap.size,GR=4,cw=Math.floor(S/GR),feats=[];
  for(var gy=0;gy<GR;gy++)for(var gx=0;gx<GR;gx++){
    var ps=0,ns=0,pc=0,nc=0;
    for(var y=gy*cw;y<(gy+1)*cw&&y<S;y++)for(var x=gx*cw;x<(gx+1)*cw&&x<S;x++){
      if(!inFaceMask(x,y,S))continue; // skip outside face
      var v=d[y*S+x];if(v>0){ps+=v;pc++}else if(v<0){ns+=v;nc++}
    }
    feats.push(pc>0?ps/pc:0,nc>0?ns/nc:0,pc/(pc+nc+1));
  }
  return feats;
}

// ============================================================
// Capture
// ============================================================
async function doCapture(){
  if(!ready)return;
  document.getElementById('b2').disabled=true;
  document.getElementById('b3').disabled=true;
  try{
    st('Detecting face...','ld');
    var mp=fl.detect(vid);
    if(!mp.faceLandmarks||!mp.faceLandmarks.length){st('No face','er');document.getElementById('b2').disabled=false;document.getElementById('b3').disabled=false;return}
    var lm=mp.faceLandmarks[0];

    // Frontal pose check: nose tip should be centered between eyes
    var noseX=lm[1].x;
    var leftEyeX=(lm[33].x+lm[133].x)/2;
    var rightEyeX=(lm[263].x+lm[362].x)/2;
    var eyeMidX=(leftEyeX+rightEyeX)/2;
    var eyeSpan=Math.abs(rightEyeX-leftEyeX);
    var noseOffset=Math.abs(noseX-eyeMidX)/eyeSpan;  // 0=perfect center, >0.15=turned
    var noseY=lm[1].y;
    var foreheadY=lm[10].y;
    var chinY=lm[152].y;
    var faceH=chinY-foreheadY;
    var noseFaceRatio=(noseY-foreheadY)/faceH;  // ~0.55=level, <0.5=looking up, >0.6=looking down
    var yawOk=noseOffset<0.12;
    var pitchOk=noseFaceRatio>0.45&&noseFaceRatio<0.65;

    if(!yawOk||!pitchOk){
      st('Face not frontal (yaw='+noseOffset.toFixed(2)+', pitch='+noseFaceRatio.toFixed(2)+') — look straight at camera','er');
      document.getElementById('b2').disabled=false;document.getElementById('b3').disabled=false;return;
    }

    lg('Pose OK: yaw='+noseOffset.toFixed(3)+' pitch='+noseFaceRatio.toFixed(3));

    st('RGB pipeline...','ld');
    var aligned=arcfaceAlign(vid,lm,112);
    var normResult=normalize(aligned);
    var normed=normResult.final;
    var steps=normResult.steps;
    var ph=pHash(normed);

    // Bone ratios
    st('Bone ratios...','ld');
    var bones=boneRatios(lm);
    lg('Bones: '+JSON.stringify(bones));

    // Depth (lazy load, skip on OOM)
    var depthResult=null,depthAligned=null,depthLap=null,depthCurv=null,depthMs=0;
    var hasDepth=await ensureDepth();
    if(hasDepth){
      try{
        st('Depth inference...','ld');
        var dr=await runDepth(vid);
        depthMs=dr.ms;
        depthAligned=alignDepth(dr.data,dr.h,dr.w,lm,56);
        depthLap=laplacian(depthAligned);
        depthCurv=curvFeats(depthLap);
        lg('Depth OK: '+depthMs+'ms, curv=['+depthCurv.slice(0,6).map(function(v){return v.toFixed(4)}).join(',')+',...]');
      }catch(e){
        lg('Depth capture failed: '+e.message);
        depthFailed=true;
      }
    }

    var ssimVal=null,diffImg=null;
    if(caps.length>0){
      ssimVal=computeSSIM(caps[0].normed,normed);
      diffImg=computeDiff(caps[0].normed,normed);
    }

    var n=caps.length+1;
    caps.push({n:n,aligned:aligned,normed:normed,steps:steps,ph:ph,ssim:ssimVal,diff:diffImg,
               bones:bones,depthAligned:depthAligned,depthLap:depthLap,depthCurv:depthCurv,depthMs:depthMs});
    render();
    var msg='#'+n+(ssimVal!==null?' SSIM:'+ssimVal.toFixed(4):'');
    if(depthMs>0)msg+=' depth:'+depthMs+'ms';
    if(!hasDepth)msg+=' (no depth)';
    st(msg,'ok');
  }catch(e){st('Capture error: '+e.message,'er');console.error(e)}
  document.getElementById('b2').disabled=false;
  document.getElementById('b3').disabled=false;
}
window.doCapture=doCapture;

async function doCapture5(){for(var i=0;i<5;i++){await doCapture();await new Promise(function(r){setTimeout(r,500)})}}
window.doCapture5=doCapture5;

function doClear(){caps=[];document.getElementById('res').innerHTML='';document.getElementById('stab').style.display='none'}
window.doClear=doClear;

// ============================================================
// Render
// ============================================================
function hm(a,b){return a.ha===b.ha||a.hb===b.ha||a.ha===b.hb||a.hb===b.hb}

function render(){
  var el=document.getElementById('res'),f0=caps[0],html='';
  for(var ci=0;ci<caps.length;ci++){
    var c=caps[ci];
    var id='c'+c.n;
    var ssimStr=c.ssim!==null?'SSIM:'+c.ssim.toFixed(4):'(ref)';
    var ssimCol=c.ssim===null?'cn':c.ssim>=0.98?'mt':c.ssim>=0.90?'cn':'df';

    html+='<div class="card"><h3><span class="cn">#'+c.n+'</span> <span class="'+ssimCol+'">'+ssimStr+'</span></h3>';
    html+='<div class="pipeline">';
    html+='<div class="stage"><canvas id="'+id+'_a" width="112" height="112"></canvas><div class="lbl">aligned</div></div>';
    html+='<div class="stage"><canvas id="'+id+'_n" width="112" height="112"></canvas><div class="lbl">normalized</div></div>';
    if(c.depthAligned)html+='<div class="stage"><canvas id="'+id+'_da" width="56" height="56"></canvas><div class="lbl">depth</div></div>';
    if(c.depthLap)html+='<div class="stage"><canvas id="'+id+'_dl" width="56" height="56"></canvas><div class="lbl">laplacian</div></div>';
    if(c.diff)html+='<div class="stage"><canvas id="'+id+'_d" width="112" height="112"></canvas><div class="lbl">diff</div></div>';
    html+='</div>';

    // Bone ratios comparison
    if(c.bones&&f0.bones){
      var bKeys=Object.keys(c.bones);
      var bMatch=0;
      for(var bi=0;bi<bKeys.length;bi++){
        var bw2=0.05;
        if(Math.round(c.bones[bKeys[bi]]/bw2)===Math.round(f0.bones[bKeys[bi]]/bw2))bMatch++;
      }
      html+='<div class="hr"><span class="lb">Bones:</span><span class="hv"><span class="'+(bMatch===bKeys.length?'mt':'cn')+'">'+bMatch+'/'+bKeys.length+' bins match</span> ';
      // Show each ratio value
      for(var bi=0;bi<bKeys.length;bi++){
        var k=bKeys[bi],v1=f0.bones[k],v2=c.bones[k];
        var same=Math.round(v1/0.05)===Math.round(v2/0.05);
        html+='<span style="color:'+(same?'#0f0':'#f44')+'">'+k+':'+v2.toFixed(3)+' </span>';
      }
      html+='</span></div>';
    }

    // Depth curvature comparison
    if(c.depthCurv&&f0.depthCurv){
      var dBins=c.depthCurv.map(function(v){return Math.round(v/0.002)});
      var dBins0=f0.depthCurv.map(function(v){return Math.round(v/0.002)});
      var dMatch=0;
      for(var di=0;di<dBins.length;di++)if(dBins[di]===dBins0[di])dMatch++;
      html+='<div class="hr"><span class="lb">Depth:</span><span class="hv"><span class="'+(dMatch===dBins.length?'mt':dMatch>=dBins.length*0.8?'cn':'df')+'">'+dMatch+'/'+dBins.length+' bins match</span> ('+c.depthMs+'ms)</span></div>';
    }else if(!c.depthCurv){
      html+='<div class="hr"><span class="lb">Depth:</span><span class="hv" style="color:#666">skipped</span></div>';
    }

    html+='<div class="hr"><span class="lb">pHash:</span><span class="hv" style="color:'+(c.ph.p4.hex===f0.ph.p4.hex?'#0f0':'#f44')+'">'+c.ph.p4.hex+'</span></div>';
    html+='</div>';
  }
  el.innerHTML=html;

  // Draw canvases
  for(var ci=0;ci<caps.length;ci++){
    var c=caps[ci],id='c'+c.n;
    var ac=document.getElementById(id+'_a');
    if(ac)ac.getContext('2d').putImageData(c.aligned,0,0);
    drawGray(c.normed,id+'_n');
    if(c.depthAligned)drawFloat(c.depthAligned.data,c.depthAligned.size,id+'_da');
    if(c.depthLap)drawFloat(c.depthLap.data,c.depthLap.size,id+'_dl');
    if(c.diff)drawDiffHeatmap(c.diff,id+'_d');
  }

  // Stability
  if(caps.length>=2){
    var t=caps.length-1,ssims=[];
    var boneTotals=[],boneMatches=[];
    var depthTotals=[],depthMatches=[];
    for(var i=1;i<caps.length;i++){
      ssims.push(caps[i].ssim);
      // Bone match count
      if(caps[i].bones&&f0.bones){
        var bk=Object.keys(caps[i].bones),bm=0;
        for(var j=0;j<bk.length;j++){
          if(Math.round(caps[i].bones[bk[j]]/0.05)===Math.round(f0.bones[bk[j]]/0.05))bm++;
        }
        boneTotals.push(bk.length);boneMatches.push(bm);
      }
      // Depth match count
      if(caps[i].depthCurv&&f0.depthCurv){
        var dm2=0;
        for(var j=0;j<caps[i].depthCurv.length;j++){
          if(Math.round(caps[i].depthCurv[j]/0.002)===Math.round(f0.depthCurv[j]/0.002))dm2++;
        }
        depthTotals.push(caps[i].depthCurv.length);depthMatches.push(dm2);
      }
    }
    var avgS=(ssims.reduce(function(a,b){return a+b},0)/ssims.length).toFixed(4);
    var minS=Math.min.apply(null,ssims).toFixed(4);
    var avgBone=boneMatches.length>0?(boneMatches.reduce(function(a,b){return a+b},0)/boneMatches.length).toFixed(1):'—';
    var avgDepth=depthMatches.length>0?(depthMatches.reduce(function(a,b){return a+b},0)/depthMatches.length).toFixed(1):'—';
    var bTotal=boneTotals.length>0?boneTotals[0]:12;
    var dTotal=depthTotals.length>0?depthTotals[0]:48;
    var sc=function(v){return v>=0.98?'g':v>=0.90?'m':'b'};
    var bc=function(v,t2){return v>=t2?'g':v>=t2*0.8?'m':'b'};

    document.getElementById('stab').style.display='block';
    document.getElementById('stab').innerHTML='<h2 style="color:#ffc107;margin-bottom:8px">STABILITY ('+caps.length+' caps)</h2>'
      +'<div class="row3">'
      +'<div><div class="sm">SSIM</div><div class="pct '+sc(parseFloat(avgS))+'">'+avgS+'</div><div class="sm">min='+minS+'</div></div>'
      +'<div><div class="sm">Bone ('+bTotal+' ratios)</div><div class="pct '+bc(parseFloat(avgBone),bTotal)+'">'+avgBone+'/'+bTotal+'</div><div class="sm">avg bins match</div></div>'
      +'<div><div class="sm">Depth ('+dTotal+' feats)</div><div class="pct '+bc(parseFloat(avgDepth),dTotal)+'">'+avgDepth+'/'+dTotal+'</div><div class="sm">avg bins match</div></div>'
      +'</div>';
  }
}

function drawDiffHeatmap(diff,cid){
  var c=document.getElementById(cid);if(!c)return;
  c.width=diff.width;c.height=diff.height;
  var ctx=c.getContext('2d'),id=ctx.createImageData(diff.width,diff.height);
  for(var i=0;i<diff.data.length;i++){
    var v=diff.data[i];
    // Heatmap: black=no diff, red=max diff
    id.data[i*4]=v;id.data[i*4+1]=0;id.data[i*4+2]=0;id.data[i*4+3]=255;
  }
  ctx.putImageData(id,0,0);
}
